<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trends do Dia — Marketing</title>
<style>
  :root{--bg:#0f1115;--card:#181b22;--ink:#e8eaed;--mut:#9aa0aa;--acc:#ff4d6d;--line:#262a33}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:860px;margin:0 auto;padding:32px 20px 80px}
  header{text-align:center;padding:40px 0 24px;border-bottom:1px solid var(--line)}
  h1{margin:0;font-size:28px;letter-spacing:-.5px}
  .sub{color:var(--mut);margin-top:8px}
  .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px;margin-top:28px;text-align:center}
  .acc{color:var(--acc);font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🔥 Trends do Dia — Marketing</h1>
    <div class="sub">Pauta diária: Google · TikTok · Instagram</div>
  </header>
  <div class="box">
    <p class="acc">Aguardando o primeiro relatório.</p>
    <p>Esta página é atualizada automaticamente toda manhã, às 08:00, com as tendências em alta no Brasil e links de referência para a equipe criar conteúdo.</p>
  </div>
</div>
</body>
</html>
